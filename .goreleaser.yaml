version: 2

project_name: bgrun

before:
  hooks:
    - rustup default stable
    - cargo install --locked cargo-zigbuild

builds:
  - id: bgrun
    builder: rust
    binary: bgrun
    flags:
      - --release
      - -p=bgrun-cli
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu

  - id: bgrun-daemon
    builder: rust
    binary: bgrun-daemon
    flags:
      - --release
      - -p=bgrun-daemon
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu

archives:
  - id: bgrun
    ids:
      - bgrun
      - bgrun-daemon
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - src: docs/man/bgrun-daemon.1
        dst: docs/man/bgrun-daemon.1

homebrew_casks:
  - name: bgrun
    repository:
      owner: bethropolis
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    ids:
      - bgrun
    binaries:
      - bgrun
      - bgrun-daemon
    homepage: "https://github.com/bethropolis/bgrun"
    description: "Background process manager for development workflows"
    license: "MIT"
    url:
      verified: "github.com/bethropolis/bgrun"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
