version: 2

project_name: bgrun

before:
  hooks:
    - rustup default stable
    - cargo install --locked cargo-zigbuild

builds:
  - id: bgrun
    builder: rust
    binary: bgrun
    flags:
      - --release
      - -p=bgrun-cli
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu

  - id: bgrun-daemon
    builder: rust
    binary: bgrun-daemon
    flags:
      - --release
      - -p=bgrun-daemon
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu

archives:
  - id: bgrun
    ids:
      - bgrun
      - bgrun-daemon
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - src: docs/man/bgrun-daemon.1
        dst: docs/man/bgrun-daemon.1

homebrew_casks:
  - name: bgrun
    repository:
      owner: bethropolis
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    ids:
      - bgrun
    binaries:
      - bgrun
      - bgrun-daemon
    homepage: "https://github.com/bethropolis/bgrun"
    description: "Background process manager for development workflows"
    license: "MIT"
    url:
      verified: "github.com/bethropolis/bgrun"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"

aurs:
  - name: bgrun-bin
    ids:
      - bgrun
    homepage: "https://github.com/bethropolis/bgrun"
    description: "Background process runner for development workflows"
    license: "MIT"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/bgrun-bin.git"
    provides:
      - bgrun
      - bgrun-daemon
    conflicts:
      - bgrun
    package: |-
      install -Dm755 bgrun "${pkgdir}/usr/bin/bgrun"
      install -Dm755 bgrun-daemon "${pkgdir}/usr/bin/bgrun-daemon"

      mkdir -p "${pkgdir}/usr/share/bash-completion/completions"
      ./bgrun completions --shell bash > "${pkgdir}/usr/share/bash-completion/completions/bgrun"

      mkdir -p "${pkgdir}/usr/share/fish/vendor_completions.d"
      ./bgrun completions --shell fish > "${pkgdir}/usr/share/fish/vendor_completions.d/bgrun.fish"

      mkdir -p "${pkgdir}/usr/share/zsh/site-functions"
      ./bgrun completions --shell zsh > "${pkgdir}/usr/share/zsh/site-functions/_bgrun"

      mkdir -p "${pkgdir}/usr/share/man/man1"
      ./bgrun completions --man > "${pkgdir}/usr/share/man/man1/bgrun.1"

      install -Dm644 docs/man/bgrun-daemon.1 "${pkgdir}/usr/share/man/man1/bgrun-daemon.1"
    commit_msg_template: "Update to {{ .Tag }}"

nfpms:
  - id: packages
    package_name: bgrun
    file_name_template: >-
      {{ .PackageName }}_
      {{- .Version }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    vendor: bethropolis
    homepage: https://github.com/bethropolis/bgrun
    maintainer: bethropolis
    description: |
      Background process runner for development workflows.
      Start processes, check status, tail logs, and kill them over a Unix
      socket with JSON output. The daemon auto-starts on first CLI use.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: README.md
        dst: /usr/share/doc/bgrun/README.md
      - src: docs/man/bgrun-daemon.1
        dst: /usr/share/man/man1/bgrun-daemon.1
      - src: packaging/completions/bgrun.bash
        dst: /etc/bash_completion.d/bgrun
        packager: deb
      - src: packaging/completions/bgrun.bash
        dst: /etc/bash_completion.d/bgrun
        packager: rpm
      - src: packaging/completions/bgrun.fish
        dst: /usr/share/fish/vendor_completions.d/bgrun.fish
      - src: packaging/completions/bgrun.zsh
        dst: /usr/share/zsh/site-functions/_bgrun
    deb:
      lintian_overrides:
        - statically-linked-binary
    rpm:
      summary: Background process runner for development workflows

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  abbrev: 0
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^refactor:"
      - "typo"
      - "Merge pull request"
      - "Merge branch"

release:
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto
  make_latest: true
  header: |
    ## bgrun v{{ .Version }}

    Background process runner for development workflows.

    ### Installation

    **Arch Linux:**
    ```bash
    yay -S bgrun-bin
    ```

    **Debian / Ubuntu:**
    ```bash
    curl -LO https://github.com/bethropolis/bgrun/releases/download/v{{ .Version }}/bgrun_{{ .Version }}_x86_64.deb
    sudo dpkg -i bgrun_{{ .Version }}_x86_64.deb
    ```

    **Fedora / RHEL:**
    ```bash
    curl -LO https://github.com/bethropolis/bgrun/releases/download/v{{ .Version }}/bgrun_{{ .Version }}_x86_64.rpm
    sudo rpm -i bgrun_{{ .Version }}_x86_64.rpm
    ```

    **Homebrew:**
    ```bash
    brew install bethropolis/tap/bgrun
    ```

    **Quick install:**
    ```bash
    curl -fsSL https://bethropolis.github.io/bgrun/install.sh | sh
    ```

    **Tarball:**
    ```bash
    curl -LO https://github.com/bethropolis/bgrun/releases/download/v{{ .Version }}/bgrun_{{ .Version }}_linux_x86_64.tar.gz
    tar -xzf bgrun_{{ .Version }}_linux_x86_64.tar.gz
    sudo mv bgrun bgrun-daemon /usr/local/bin/
    ```
  footer: |
    **Full Changelog:** https://github.com/bethropolis/bgrun/compare/{{ .PreviousTag }}...v{{ .Version }}
