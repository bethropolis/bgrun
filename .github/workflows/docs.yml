name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "book.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=$(curl -s https://api.github.com/repos/rust-lang/mdBook/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          sudo mv mdbook /usr/local/bin/

      - name: Prepare Book Source
        run: |
          mkdir -p docs/book-src
          cp README.md docs/book-src/index.md
          cp docs/architecture.md docs/book-src/architecture.md
          cp docs/bgrun-toml.md docs/book-src/bgrun-toml.md
          cp docs/commands.md docs/book-src/commands.md
          cat << 'EOF' > docs/book-src/SUMMARY.md
          # Summary

          - [Introduction](index.md)
          - [Architecture](architecture.md)
          - [bgrun.toml Reference](bgrun-toml.md)
          - [Command Reference](commands.md)
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Book
        run: mdbook build

      - name: Copy install script
        run: cp scripts/install.sh book/install.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
